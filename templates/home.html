<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Indicator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .card{
            width: 100%;
            max-width: 850px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .card-header{
            background: #4f46e5;
            color: white;
            text-align: center;
            padding: 25px;
            border-radius: 20px 20px 0 0 !important;
        }

        .form-label{
            font-weight: 600;
        }

        .btn-custom{
            background: #4f46e5;
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 18px;
            font-weight: 600;
        }

        .btn-custom:hover{
            background: #4338ca;
            color: white;
        }

        .result-box{
            margin-top: 25px;
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            background: #f8f9fa;
            font-size: 22px;
            font-weight: bold;
            color: #198754;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="card-header">
        <h1>Student Exam Performance Indicator</h1>
        <p class="mb-0">Predict Student Maths Score</p>
    </div>

    <div class="card-body p-4">

        <form action="{{ url_for('predict_datapoint')}}" method="post">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Gender</label>
                    <select class="form-control" name="gender" required>
                        <option selected disabled value="">Select your Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Race or Ethnicity</label>
                    <select class="form-control" name="ethnicity" required>
                        <option selected disabled value="">Select Ethnicity</option>
                        <option value="group A">Group A</option>
                        <option value="group B">Group B</option>
                        <option value="group C">Group C</option>
                        <option value="group D">Group D</option>
                        <option value="group E">Group E</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Parental Level of Education</label>
                    <select class="form-control" name="parental_level_of_education" required>
                        <option selected disabled value="">Select Parent Education</option>
                        <option value="associate's degree">associate's degree</option>
                        <option value="bachelor's degree">bachelor's degree</option>
                        <option value="high school">high school</option>
                        <option value="master's degree">master's degree</option>
                        <option value="some college">some college</option>
                        <option value="some high school">some high school</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Lunch Type</label>
                    <select class="form-control" name="lunch" required>
                        <option selected disabled value="">Select Lunch Type</option>
                        <option value="free/reduced">free/reduced</option>
                        <option value="standard">standard</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Test Preparation Course</label>
                    <select class="form-control" name="test_preparation_course" required>
                        <option selected disabled value="">Select Test Course</option>
                        <option value="none">None</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Reading Score out of 100</label>
                    <input
                        class="form-control"
                        type="number"
                        name="reading_score"
                        placeholder="Enter Reading Score"
                        min="0"
                        max="100"
                        required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Writing Score out of 100</label>
                    <input
                        class="form-control"
                        type="number"
                        name="writing_score"
                        placeholder="Enter Writing Score"
                        min="0"
                        max="100"
                        required>
                </div>

            </div>

            <div class="mt-3">
                <input
                    class="btn btn-custom"
                    type="submit"
                    value="Predict your Maths Score">
            </div>

        </form>

        {% if results %}
        <div class="result-box">
            Predicted Maths Score: {{ results }}
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
